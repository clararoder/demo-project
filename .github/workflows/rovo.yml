name: Rovo Dev on PR comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  rovo:
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/rovo')
    runs-on: ubuntu-latest
    steps:
      - name: React 👀 to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Resolve PR head ref
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_repo', pr.data.head.repo.full_name);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract prompt from comment
        id: prompt
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          user_prompt="${BODY#/rovo}"
          user_prompt="${user_prompt# }"
          full_prompt="$user_prompt

IMPORTANT: In addition to any file changes you make, write your full response (analysis, review notes, summary, or answer) as Markdown to /tmp/rovo-output.md so it can be shown to the user on the PR. If you have nothing else to say beyond the file changes, write a one-line summary there."
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "value<<$delim"
            printf '%s\n' "$full_prompt"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Rovo Dev
        uses: atlassian-labs/rovo-dev-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.value }}
          atlassian_email: ${{ secrets.ATLASSIAN_EMAIL }}
          atlassian_token: ${{ secrets.ATLASSIAN_TOKEN }}

      - name: Post Rovo response as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/rovo-output.md';
            if (!fs.existsSync(path)) {
              core.info('No /tmp/rovo-output.md produced by Rovo.');
              return;
            }
            const body = fs.readFileSync(path, 'utf8').trim();
            if (!body) {
              core.info('/tmp/rovo-output.md was empty.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Commit & push changes to PR branch
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Rovo made no changes."
            exit 0
          fi
          git config user.name "rovo-dev-bot"
          git config user.email "rovo-dev-bot@users.noreply.github.com"
          git add -A
          git commit -m "Rovo Dev changes (comment #${{ github.event.comment.id }})"
          git push

      - name: React ✅ on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1',
            });
